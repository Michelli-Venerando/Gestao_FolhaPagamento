<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Folha de Pagamento</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .menu-item {
      margin: 15px 0;
      cursor: pointer;
    }

    .menu-item:hover {
      color: #38bdf8;
    }

    .content {
      flex: 1;
      padding: 20px;
      background: #f1f5f9;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- MENU -->
  <div class="menu">
    <h2>💼 Sistema</h2>

    <button onclick="mostrarTela('funcionarios')">Funcionários</button>
    <button onclick="mostrarTela('lancamentos')">Lançamentos</button>
    <button onclick="mostrarTela('folha')">Folha</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <!-- FUNCIONÁRIOS -->
    <div id="tela-funcionarios">
      <h1>Funcionários</h1>

      <input type="hidden" id="idFuncionario">

      <input id="nome" placeholder="Nome">
      <input id="data_admissao" type="date">
      <input id="telefone" placeholder="Telefone">
      <input id="pix" placeholder="PIX">
      <input id="salario" placeholder="Salário">
      <input id="bonificacao" placeholder="Bonificação">
      <input id="vt_diario" placeholder="VT diário">

      <select id="tipo_pagamento">
        <option value="mensal">Mensal</option>
        <option value="semanal">Semanal</option>
      </select>

      <br><br>

      <button onclick="salvarFuncionario()">Salvar</button>
      <button onclick="carregarFuncionarios()">Carregar</button>

      <table border="1">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Salário</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="listaFuncionarios"></tbody>
      </table>
    </div>

    <!-- LANÇAMENTOS -->
    <div id="tela-lancamentos" style="display:none;">
      <h1>Lançamentos</h1>
    </div>

    <!-- FOLHA -->
    <div id="tela-folha" style="display:none;">
      <h1>Folha de Pagamento</h1>
    </div>

  </div>
</div>

  <script src="js/script.js"></script>

</body>
</html>
