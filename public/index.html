<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Folha de Pagamento</title>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <div class="menu">
    <h2>💼 Sistema</h2>

    <button onclick="mostrarTela('funcionarios')">Funcionários</button>
    <button onclick="mostrarTela('lancamentos')">Lançamentos</button>
    <button onclick="mostrarTela('folha')">Folha</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <!-- FUNCIONÁRIOS -->
    <div id="tela-funcionarios">

  <h1>Funcionários</h1>

  <div class="card">
    <h3>Cadastrar / Editar</h3>

    <input type="hidden" id="idFuncionario">

    <input id="nome" placeholder="Nome">
    <input id="data_admissao" type="date">
    <input id="telefone" placeholder="Telefone">
    <input id="pix" placeholder="PIX">
    <input id="salario" placeholder="Salário">
    <input id="bonificacao" placeholder="Bonificação">
    <input id="vt_diario" placeholder="VT diário">

    <select id="tipo_pagamento">
      <option value="mensal">Mensal</option>
      <option value="semanal">Semanal</option>
    </select>

    <button class="btn btn-primary" onclick="salvarFuncionario()">Salvar</button>
    <button class="btn" onclick="carregarFuncionarios()">Atualizar</button>
  </div>

  <div class="card">
    <h3>Lista de Funcionários</h3>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Salário</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="listaFuncionarios"></tbody>
    </table>
  </div>

</div>

    <!-- LANÇAMENTOS -->
    <div id="tela-lancamentos" style="display:none;">
  <h2>Lançamentos</h2>

  <h3>Registrar Evento</h3>

  <select id="funcionarioLancamento"></select>

  <input type="date" id="dataLancamento">

  <select id="tipoLancamento">
    <option value="falta">Falta</option>
    <option value="atraso">Atraso</option>
    <option value="desconto">Desconto</option>
  </select>

  <input type="number" id="valorLancamento" placeholder="Valor (para desconto)">
  <input type="text" id="obsLancamento" placeholder="Observação">

  <button onclick="salvarLancamento()">Salvar</button>

  <h3>Registros</h3>
  <ul id="listaLancamentos"></ul>
</div>

    <!-- FOLHA -->
    <div id="tela-folha" style="display:none;">
      <h1>Folha de Pagamento</h1>
    </div>

  </div>
</div>

  <script src="js/script.js"></script>

</body>
</html>
