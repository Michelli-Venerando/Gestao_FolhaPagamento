<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Folha de Pagamento</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .menu-item {
      margin: 15px 0;
      cursor: pointer;
    }

    .menu-item:hover {
      color: #38bdf8;
    }

    .content {
      flex: 1;
      padding: 20px;
      background: #f1f5f9;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>💼 Sistema</h2>

    <div class="menu-item" onclick="mostrarTela('funcionarios')">👤 Funcionários</div>
    <div class="menu-item" onclick="mostrarTela('lancamentos')">💰 Lançamentos</div>
    <div class="menu-item" onclick="mostrarTela('folha')">📄 Folha de Pagamento</div>
  </div>

  <div class="content">

<h1>Funcionários</h1>

<h3>Cadastrar Funcionário</h3>

<input type="hidden" id="idFuncionario">

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="cargo" placeholder="Cargo">
<input id="data_admissao" type="date"><br><br>
<input id="telefone" placeholder="Telefone"><br><br>
<input id="pix" placeholder="PIX"><br><br>
<input type="text" id="salario" placeholder="Salário">
<input id="bonificacao" placeholder="Bonificação"><br><br>


<select id="tipo_pagamento">
  <option value="mensal">Mensal</option>
  <option value="semanal">Semanal</option>
</select><br><br>

<input id="vt_diario" placeholder="VT Diário"><br><br>

<button onclick="salvarFuncionario()">Salvar</button>

<hr>

<button onclick="carregarFuncionarios()">Carregar Funcionários</button>

<table border="1" width="100%" id="tabela">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Salário</th>
      <th>Tipo</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody id="listaFuncionarios"></tbody>
</table>

    <div id="tela-lancamentos" style="display:none;">
      <h1>Lançamentos</h1>
      <p>Em breve...</p>
    </div>

    <div id="tela-folha" style="display:none;">
      <h1>Folha de Pagamento</h1>
      <p>Em breve...</p>
    </div>

  </div>

  <script src="js/script.js"></script>

</body>
</html>
